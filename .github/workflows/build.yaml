name: build

on:
  push:
    tags:
      - 'v*'

env:
  IS_STABLE: ${{ !contains(github.ref, '-') }}

jobs:
  build-android:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - abi: arm64-v8a
          - abi: armeabi-v7a
          - abi: x86_64

    steps:
      - uses: actions/checkout@v4

      - name: Clone Go core
        run: git clone --depth=1 -b FlClash https://github.com/chen08209/Clash.Meta.git core/Clash.Meta

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24.0'
          cache-dependency-path: core/go.sum

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.41.9
          cache: true

      - uses: nttld/setup-ndk@v1
        with:
          ndk-version: r28c
          add-to-path: true
          link-to-sdk: true

      - name: Build Go core for Android ${{ matrix.abi }}
        run: bash plugins/setup/buildkit/run_build_tool.sh android
        env:
          ANDROID_ABI: ${{ matrix.abi }}

      - run: flutter pub get

      - name: Build APK ${{ matrix.abi }}
        run: flutter build apk --release --target-platform=android-${{ matrix.abi == 'arm64-v8a' && 'arm64' || matrix.abi == 'armeabi-v7a' && 'arm' || 'x64' }}

      - uses: actions/upload-artifact@v4
        with:
          name: android-${{ matrix.abi }}
          path: build/app/outputs/flutter-apk/*.apk
          overwrite: true

  build-windows-amd64:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - name: Clone Go core
        run: git clone --depth=1 -b FlClash https://github.com/chen08209/Clash.Meta.git core/Clash.Meta

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24.0'
          cache-dependency-path: core/go.sum

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.41.9
          cache: true

      - run: flutter pub get

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Package exe and zip
        run: dart setup.dart windows --env=stable --targets=exe,zip --verbose

      - uses: actions/upload-artifact@v4
        with:
          name: windows-amd64
          path: dist/*
          overwrite: true

  build-macos-amd64:
    runs-on: macos-15-intel
    steps:
      - uses: actions/checkout@v4

      - name: Clone Go core
        run: git clone --depth=1 -b FlClash https://github.com/chen08209/Clash.Meta.git core/Clash.Meta

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24.0'
          cache-dependency-path: core/go.sum

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.41.9
          cache: true

      - run: flutter pub get

      - name: Install DMG tooling
        run: npm install -g appdmg

      - name: Package dmg
        run: dart setup.dart macos --env=stable --targets=dmg --verbose

      - name: Package app zip
        run: |
          cd build/macos/Build/Products/Release
          APP=$(ls -d *.app | head -1)
          zip -r "$GITHUB_WORKSPACE/dist/MoneyFly-macos-amd64.zip" "$APP"

      - uses: actions/upload-artifact@v4
        with:
          name: macos-amd64
          path: dist/*
          overwrite: true

  build-macos-arm64:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Clone Go core
        run: git clone --depth=1 -b FlClash https://github.com/chen08209/Clash.Meta.git core/Clash.Meta

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24.0'
          cache-dependency-path: core/go.sum

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.41.9
          cache: true

      - run: flutter pub get

      - name: Install DMG tooling
        run: npm install -g appdmg

      - name: Package dmg
        run: dart setup.dart macos --env=stable --targets=dmg --verbose

      - name: Package app zip
        run: |
          cd build/macos/Build/Products/Release
          APP=$(ls -d *.app | head -1)
          zip -r "$GITHUB_WORKSPACE/dist/MoneyFly-macos-arm64.zip" "$APP"

      - uses: actions/upload-artifact@v4
        with:
          name: macos-arm64
          path: dist/*
          overwrite: true

  release:
    if: ${{ !contains(github.ref, '-') }}
    needs: [build-android, build-windows-amd64, build-macos-amd64, build-macos-arm64]
    runs-on: ubuntu-latest
    permissions: write-all
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: ./dist/
          merge-multiple: true

      - name: Generate SHA256
        run: |
          cd ./dist
          find . -maxdepth 1 -type f ! -name SHA256SUMS -print0 | sort -z | xargs -0 sha256sum > SHA256SUMS

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            ./dist/*.apk
            ./dist/*.dmg
            ./dist/*.exe
            ./dist/*.zip
            ./dist/SHA256SUMS
          generate_release_notes: true
          name: MoneyFly ${{ github.ref_name }}
