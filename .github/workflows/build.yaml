name: build

on:
  push:
    tags:
      - 'v*'

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24.0'
          cache-dependency-path: core/go.sum

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.41.9
          cache: true

      - uses: nttld/setup-ndk@v1
        with:
          ndk-version: r28c
          add-to-path: true
          link-to-sdk: true

      - name: Build Go core for Android
        run: bash plugins/setup/buildkit/run_build_tool.sh android

      - name: Flutter pub get
        run: flutter pub get

      - name: Build APK (no sign)
        run: flutter build apk --release --split-per-abi

      - uses: actions/upload-artifact@v4
        with:
          name: android-apks
          path: build/app/outputs/flutter-apk/*.apk
          overwrite: true

  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Linux deps
        run: sudo apt-get update && sudo apt-get install -y libayatana-appindicator3-dev libkeybinder-3.0-dev

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24.0'
          cache-dependency-path: core/go.sum

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.41.9
          cache: true

      - name: Build Go core for Linux
        run: bash plugins/setup/buildkit/run_build_tool.sh linux

      - run: flutter pub get
      - run: flutter build linux --release

      - uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: build/linux/x64/release/bundle/
          overwrite: true

  build-macos:
    runs-on: macos-15-intel
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24.0'
          cache-dependency-path: core/go.sum

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.41.9
          cache: true

      - run: flutter pub get
      - run: flutter build macos --release

      - name: Archive .app
        run: cd build/macos/Build/Products/Release && zip -r MoneyFly-macos.zip MoneyFly.app

      - uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: build/macos/Build/Products/Release/MoneyFly-macos.zip
          overwrite: true

  build-windows:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24.0'
          cache-dependency-path: core/go.sum

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.41.9
          cache: true

      - run: flutter pub get
      - run: flutter build windows --release

      - name: Archive build
        run: Compress-Archive -Path build\windows\x64\runner\Release\* -DestinationPath MoneyFly-windows.zip

      - uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: MoneyFly-windows.zip
          overwrite: true

  release:
    needs: [build-android, build-linux, build-macos, build-windows]
    runs-on: ubuntu-latest
    permissions: write-all
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: ./dist/
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: ./dist/**/*
          generate_release_notes: true
