name: build

on:
  push:
    tags:
      - 'v*'

env:
  IS_STABLE: ${{ !contains(github.ref, '-') }}

jobs:
  build-android:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - abi: arm64-v8a
          - abi: armeabi-v7a
          - abi: x86_64

    steps:
      - uses: actions/checkout@v4

      - name: Clone Go core
        run: git clone --depth=1 -b FlClash https://github.com/chen08209/Clash.Meta.git core/Clash.Meta

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24.0'
          cache-dependency-path: core/go.sum

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.41.9
          cache: true

      - uses: nttld/setup-ndk@v1
        with:
          ndk-version: r28c
          add-to-path: true
          link-to-sdk: true

      - name: Build Go core for Android ${{ matrix.abi }}
        run: bash plugins/setup/buildkit/run_build_tool.sh android
        env:
          ANDROID_ABI: ${{ matrix.abi }}

      - run: flutter pub get

      - name: Build APK ${{ matrix.abi }}
        run: flutter build apk --release --target-platform=android-${{ matrix.abi == 'arm64-v8a' && 'arm64' || matrix.abi == 'armeabi-v7a' && 'arm' || 'x64' }}

      - uses: actions/upload-artifact@v4
        with:
          name: android-${{ matrix.abi }}
          path: build/app/outputs/flutter-apk/*.apk
          overwrite: true

  build-windows-amd64:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - name: Clone Go core
        run: git clone --depth=1 -b FlClash https://github.com/chen08209/Clash.Meta.git core/Clash.Meta

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24.0'
          cache-dependency-path: core/go.sum

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.41.9
          cache: true

      - run: flutter pub get
      - run: flutter build windows --release

      - name: Package
        run: |
          Compress-Archive -Path build\windows\x64\runner\Release\* -DestinationPath MoneyFly-windows-amd64.zip

      - uses: actions/upload-artifact@v4
        with:
          name: windows-amd64
          path: MoneyFly-windows-amd64.zip
          overwrite: true

  build-windows-arm64:
    runs-on: windows-11-arm
    steps:
      - uses: actions/checkout@v4

      - name: Clone Go core
        run: git clone --depth=1 -b FlClash https://github.com/chen08209/Clash.Meta.git core/Clash.Meta

      - name: Setup Rust
        run: |
          Invoke-WebRequest -Uri "https://win.rustup.rs/aarch64" -OutFile rustup-init.exe
          .\rustup-init.exe -y --default-toolchain stable
          $cargoPath = "$env:USERPROFILE\.cargo\bin"
          Add-Content $env:GITHUB_PATH $cargoPath

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24.0'
          cache-dependency-path: core/go.sum

      - uses: subosito/flutter-action@v2
        with:
          channel: master
          flutter-version: 3.44.0-0.1.pre
          cache: true

      - run: flutter pub get
      - run: flutter build windows --release

      - name: Package
        run: |
          Compress-Archive -Path build\windows\arm64\runner\Release\* -DestinationPath MoneyFly-windows-arm64.zip

      - uses: actions/upload-artifact@v4
        with:
          name: windows-arm64
          path: MoneyFly-windows-arm64.zip
          overwrite: true

  build-macos-amd64:
    runs-on: macos-15-intel
    steps:
      - uses: actions/checkout@v4

      - name: Clone Go core
        run: git clone --depth=1 -b FlClash https://github.com/chen08209/Clash.Meta.git core/Clash.Meta

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24.0'
          cache-dependency-path: core/go.sum

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.41.9
          cache: true

      - run: flutter pub get
      - run: flutter build macos --release

      - name: Package
        run: |
          cd build/macos/Build/Products/Release
          zip -r MoneyFly-macos-amd64.zip MoneyFly.app

      - uses: actions/upload-artifact@v4
        with:
          name: macos-amd64
          path: build/macos/Build/Products/Release/MoneyFly-macos-amd64.zip
          overwrite: true

  build-macos-arm64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Clone Go core
        run: git clone --depth=1 -b FlClash https://github.com/chen08209/Clash.Meta.git core/Clash.Meta

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24.0'
          cache-dependency-path: core/go.sum

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.41.9
          cache: true

      - run: flutter pub get
      - run: flutter build macos --release

      - name: Package
        run: |
          cd build/macos/Build/Products/Release
          zip -r MoneyFly-macos-arm64.zip MoneyFly.app

      - uses: actions/upload-artifact@v4
        with:
          name: macos-arm64
          path: build/macos/Build/Products/Release/MoneyFly-macos-arm64.zip
          overwrite: true

  release:
    if: ${{ !contains(github.ref, '-') }}
    needs: [build-android, build-windows-amd64, build-macos-amd64, build-macos-arm64]
    runs-on: ubuntu-latest
    permissions: write-all
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: ./dist/
          merge-multiple: true

      - name: Generate SHA256
        run: cd ./dist && sha256sum * > SHA256SUMS

      - uses: softprops/action-gh-release@v2
        with:
          files: ./dist/*
          generate_release_notes: true
          name: MoneyFly ${{ github.ref_name }}
