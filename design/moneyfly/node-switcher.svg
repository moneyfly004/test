<svg width="1600" height="1000" viewBox="0 0 1600 1000" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="MoneyFly node switcher">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#07111f"/>
      <stop offset="100%" stop-color="#091827"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#25d0ff"/>
      <stop offset="100%" stop-color="#33f0b2"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="1000" fill="url(#bg)"/>
  <rect x="70" y="70" width="1460" height="860" rx="24" fill="#0d1928" stroke="#203956"/>
  <text x="108" y="124" fill="#eef6ff" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="700">Node switcher</text>
  <text x="108" y="154" fill="#8ca2c5" font-family="Inter, Arial, sans-serif" font-size="14">The current strategy group stays editable, while the profile subscription itself remains hidden</text>

  <rect x="108" y="198" width="1384" height="70" rx="18" fill="#12233c" stroke="#294a73"/>
  <text x="138" y="242" fill="#8ca2c5" font-family="Inter, Arial, sans-serif" font-size="14">Only the main strategy group can be changed here, matching the existing proxy group page</text>

  <rect x="108" y="294" width="430" height="546" rx="22" fill="#101f33" stroke="#21405f"/>
  <text x="138" y="334" fill="#8ca2c5" font-family="Inter, Arial, sans-serif" font-size="13">GROUPS</text>
  <rect x="136" y="356" width="374" height="72" rx="18" fill="url(#accent)"/>
  <text x="164" y="398" fill="#04111a" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700">Auto Select</text>
  <rect x="136" y="444" width="374" height="72" rx="18" fill="#0f2035" stroke="#203956"/>
  <text x="164" y="486" fill="#c2d4ee" font-family="Inter, Arial, sans-serif" font-size="22">Global</text>
  <rect x="136" y="532" width="374" height="72" rx="18" fill="#0f2035" stroke="#203956"/>
  <text x="164" y="574" fill="#c2d4ee" font-family="Inter, Arial, sans-serif" font-size="22">Direct</text>
  <rect x="136" y="620" width="374" height="72" rx="18" fill="#0f2035" stroke="#203956"/>
  <text x="164" y="662" fill="#c2d4ee" font-family="Inter, Arial, sans-serif" font-size="22">Streaming</text>

  <rect x="566" y="294" width="846" height="546" rx="22" fill="#101f33" stroke="#21405f"/>
  <text x="598" y="334" fill="#8ca2c5" font-family="Inter, Arial, sans-serif" font-size="13">NODES</text>
  <rect x="598" y="360" width="782" height="78" rx="18" fill="#0f2035" stroke="#203956"/>
  <circle cx="632" cy="399" r="9" fill="#6ef5c2"/>
  <text x="656" y="406" fill="#eef6ff" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">HK-02 Optimized</text>
  <text x="1250" y="406" fill="#6ef5c2" font-family="Inter, Arial, sans-serif" font-size="16">42 ms</text>
  <rect x="598" y="452" width="782" height="78" rx="18" fill="#0f2035" stroke="#203956"/>
  <circle cx="632" cy="491" r="9" fill="#25d0ff"/>
  <text x="656" y="498" fill="#c2d4ee" font-family="Inter, Arial, sans-serif" font-size="18">SG-01 Stable</text>
  <text x="1250" y="498" fill="#8ca2c5" font-family="Inter, Arial, sans-serif" font-size="16">53 ms</text>
  <rect x="598" y="544" width="782" height="78" rx="18" fill="#0f2035" stroke="#203956"/>
  <circle cx="632" cy="583" r="9" fill="#8ca2c5"/>
  <text x="656" y="590" fill="#c2d4ee" font-family="Inter, Arial, sans-serif" font-size="18">JP-04</text>
  <text x="1250" y="590" fill="#8ca2c5" font-family="Inter, Arial, sans-serif" font-size="16">66 ms</text>

  <text x="108" y="892" fill="#8ca2c5" font-family="Inter, Arial, sans-serif" font-size="14">Node list comes from the current Clash proxy group, while the fixed subscription profile remains invisible to the user.</text>
</svg>
