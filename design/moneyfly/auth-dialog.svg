<svg width="1200" height="820" viewBox="0 0 1200 820" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="MoneyFly login dialog">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#07111f"/>
      <stop offset="100%" stop-color="#091827"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#25d0ff"/>
      <stop offset="100%" stop-color="#33f0b2"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="820" fill="url(#bg)"/>
  <rect x="70" y="70" width="1060" height="680" rx="22" fill="#0d1928" stroke="#203956"/>
  <rect x="70" y="70" width="1060" height="680" rx="22" fill="#000000" opacity="0.32"/>
  <rect x="388" y="132" width="424" height="556" rx="24" fill="#101f33" stroke="#294a73"/>
  <text x="430" y="198" fill="#eef6ff" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="700">MoneyFly</text>
  <text x="430" y="230" fill="#8ca2c5" font-family="Inter, Arial, sans-serif" font-size="14">Dialog login over locked app shell</text>
  <rect x="430" y="284" width="340" height="58" rx="14" fill="#12233c" stroke="#28486f"/>
  <text x="452" y="320" fill="#eaf3ff" font-family="Inter, Arial, sans-serif" font-size="16">Email or username</text>
  <rect x="430" y="364" width="340" height="58" rx="14" fill="#12233c" stroke="#28486f"/>
  <text x="452" y="400" fill="#eaf3ff" font-family="Inter, Arial, sans-serif" font-size="16">Password</text>
  <rect x="430" y="446" width="340" height="58" rx="14" fill="url(#accent)"/>
  <text x="572" y="482" fill="#06111d" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800">Login</text>
  <text x="430" y="542" fill="#73f7c3" font-family="Inter, Arial, sans-serif" font-size="14">Register</text>
  <text x="650" y="542" fill="#73f7c3" font-family="Inter, Arial, sans-serif" font-size="14">Forgot password</text>
  <rect x="430" y="588" width="340" height="54" rx="14" fill="#2c1d18" stroke="#7d4b38"/>
  <text x="452" y="622" fill="#ffb9a3" font-family="Inter, Arial, sans-serif" font-size="14">401 shows backend message, not DioException</text>
</svg>
