<svg width="1600" height="1000" viewBox="0 0 1600 1000" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="MoneyFly settings account">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#07111f"/>
      <stop offset="100%" stop-color="#091827"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#25d0ff"/>
      <stop offset="100%" stop-color="#33f0b2"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="1000" fill="url(#bg)"/>
  <rect x="70" y="70" width="1460" height="860" rx="24" fill="#0d1928" stroke="#203956"/>
  <text x="108" y="124" fill="#eef6ff" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="700">Settings</text>
  <text x="108" y="154" fill="#8ca2c5" font-family="Inter, Arial, sans-serif" font-size="14">Account, language, storage and cleanup rules</text>

  <rect x="108" y="204" width="360" height="680" rx="22" fill="#101f33" stroke="#21405f"/>
  <text x="138" y="246" fill="#8ca2c5" font-family="Inter, Arial, sans-serif" font-size="13">ACCOUNT</text>
  <rect x="138" y="270" width="300" height="110" rx="18" fill="#12233c" stroke="#294a73"/>
  <text x="162" y="310" fill="#eef6ff" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700">MoneyFly</text>
  <text x="162" y="340" fill="#6ef5c2" font-family="Inter, Arial, sans-serif" font-size="16">Remember me enabled</text>
  <text x="162" y="366" fill="#8ca2c5" font-family="Inter, Arial, sans-serif" font-size="14">Tokens in secure storage</text>

  <text x="138" y="432" fill="#8ca2c5" font-family="Inter, Arial, sans-serif" font-size="13">LANGUAGE</text>
  <rect x="138" y="452" width="300" height="54" rx="16" fill="url(#accent)"/>
  <text x="164" y="486" fill="#04111a" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700">en / zh_CN / ja / ru</text>
  <text x="138" y="550" fill="#8ca2c5" font-family="Inter, Arial, sans-serif" font-size="13">CLEANUP</text>
  <rect x="138" y="570" width="300" height="164" rx="18" fill="#0f2035" stroke="#203956"/>
  <text x="162" y="608" fill="#c2d4ee" font-family="Inter, Arial, sans-serif" font-size="16">Clear cached config on exit</text>
  <text x="162" y="640" fill="#c2d4ee" font-family="Inter, Arial, sans-serif" font-size="16">Clear history and selected nodes</text>
  <text x="162" y="672" fill="#c2d4ee" font-family="Inter, Arial, sans-serif" font-size="16">Close proxy / VPN / TUN first</text>
  <text x="162" y="704" fill="#c2d4ee" font-family="Inter, Arial, sans-serif" font-size="16">Reclean on next startup</text>

  <rect x="138" y="766" width="300" height="84" rx="18" fill="#102f31" stroke="#1f6d5a"/>
  <text x="176" y="814" fill="#73f7c3" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">Local secure storage</text>

  <rect x="498" y="204" width="1032" height="680" rx="22" fill="#101f33" stroke="#21405f"/>
  <text x="532" y="246" fill="#8ca2c5" font-family="Inter, Arial, sans-serif" font-size="13">LOGIN AND TOKEN BEHAVIOR</text>
  <text x="532" y="296" fill="#eef6ff" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700">Email + password, username login retained, auto sign-in allowed</text>
  <text x="532" y="338" fill="#c2d4ee" font-family="Inter, Arial, sans-serif" font-size="18">Access token and refresh token are stored locally using platform secure storage.</text>
  <rect x="532" y="384" width="936" height="112" rx="18" fill="#12233c" stroke="#294a73"/>
  <text x="560" y="424" fill="#8ca2c5" font-family="Inter, Arial, sans-serif" font-size="13">WHEN TO PURGE</text>
  <text x="560" y="464" fill="#eef6ff" font-family="Inter, Arial, sans-serif" font-size="18">Exit app, logout, switch account, shutdown, device removed by backend</text>
  <rect x="532" y="520" width="936" height="112" rx="18" fill="#12233c" stroke="#294a73"/>
  <text x="560" y="560" fill="#8ca2c5" font-family="Inter, Arial, sans-serif" font-size="13">SUBSCRIPTION PROFILE</text>
  <text x="560" y="600" fill="#eef6ff" font-family="Inter, Arial, sans-serif" font-size="18">One hidden fixed profile only, no import/edit/delete for ordinary users</text>
  <rect x="532" y="656" width="936" height="112" rx="18" fill="#12233c" stroke="#294a73"/>
  <text x="560" y="696" fill="#8ca2c5" font-family="Inter, Arial, sans-serif" font-size="13">RELOAD RULE</text>
  <text x="560" y="736" fill="#eef6ff" font-family="Inter, Arial, sans-serif" font-size="18">Refresh subscription once on every app launch before any connection is reused</text>
</svg>
