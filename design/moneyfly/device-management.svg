  </g>
  <g>
    <rect x="124" y="452" width="1550" height="96" rx="16" fill="#0f2035" stroke="#203956"/>
    <text x="138" y="490" fill="#eef6ff" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">iPhone 15</text>
    <text x="388" y="490" fill="#c2d4ee" font-family="Inter, Arial, sans-serif" font-size="16">iOS</text>
    <text x="522" y="490" fill="#c2d4ee" font-family="Inter, Arial, sans-serif" font-size="16">MoneyFly Mobile</text>
    <text x="720" y="490" fill="#c2d4ee" font-family="Inter, Arial, sans-serif" font-size="16">198.51.100.66</text>
    <text x="928" y="490" fill="#c2d4ee" font-family="Inter, Arial, sans-serif" font-size="16">2026-06-24 22:06</text>
    <text x="1114" y="490" fill="#c2d4ee" font-family="Inter, Arial, sans-serif" font-size="16">2026-05-03 19:55</text>
    <text x="1330" y="490" fill="#c2d4ee" font-family="Inter, Arial, sans-serif" font-size="16">Travel phone</text>
    <rect x="1508" y="468" width="112" height="34" rx="17" fill="#12233c" stroke="#294a73"/>
    <text x="1540" y="490" fill="#c2d4ee" font-family="Inter, Arial, sans-serif" font-size="14">Active</text>
  </g>
  <g>
    <rect x="124" y="560" width="1550" height="96" rx="16" fill="#0f2035" stroke="#203956"/>
    <text x="138" y="598" fill="#eef6ff" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">Windows PC</text>
    <text x="388" y="598" fill="#c2d4ee" font-family="Inter, Arial, sans-serif" font-size="16">Windows</text>
    <text x="522" y="598" fill="#c2d4ee" font-family="Inter, Arial, sans-serif" font-size="16">MoneyFly v1.0</text>
    <text x="720" y="598" fill="#c2d4ee" font-family="Inter, Arial, sans-serif" font-size="16">198.51.100.81</text>
    <text x="928" y="598" fill="#c2d4ee" font-family="Inter, Arial, sans-serif" font-size="16">2026-06-23 14:40</text>
    <text x="1114" y="598" fill="#c2d4ee" font-family="Inter, Arial, sans-serif" font-size="16">2026-06-01 08:30</text>
    <text x="1330" y="598" fill="#c2d4ee" font-family="Inter, Arial, sans-serif" font-size="16">Office</text>
    <rect x="1508" y="576" width="112" height="34" rx="17" fill="#ffb347"/>
    <text x="1537" y="598" fill="#1f1404" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700">Remove</text>
  </g>
  <rect x="108" y="1048" width="1580" height="46" rx="14" fill="#10283f"/>
  <text x="138" y="1078" fill="#c2d4ee" font-family="Inter, Arial, sans-serif" font-size="14">Deleting a device should disconnect it immediately and clear cached config on next start.</text>
</svg>
