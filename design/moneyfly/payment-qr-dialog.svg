<svg width="1200" height="1200" viewBox="0 0 1200 1200" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="MoneyFly payment QR dialog">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#07111f"/>
      <stop offset="100%" stop-color="#091827"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#25d0ff"/>
      <stop offset="100%" stop-color="#33f0b2"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="1200" fill="url(#bg)"/>
  <rect x="112" y="120" width="976" height="960" rx="30" fill="#0d1928" stroke="#203956"/>
  <text x="160" y="182" fill="#eef6ff" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="700">Pay inside the app</text>
  <text x="160" y="214" fill="#8ca2c5" font-family="Inter, Arial, sans-serif" font-size="14">No browser redirect, order status polled every 2 seconds</text>

  <rect x="160" y="260" width="392" height="392" rx="28" fill="#ffffff"/>
  <g fill="#111111">
    <rect x="196" y="296" width="36" height="36"/><rect x="244" y="296" width="36" height="36"/><rect x="292" y="296" width="36" height="36"/>
    <rect x="436" y="296" width="36" height="36"/><rect x="484" y="296" width="36" height="36"/>
    <rect x="196" y="344" width="36" height="36"/><rect x="388" y="344" width="36" height="36"/><rect x="484" y="344" width="36" height="36"/>
    <rect x="196" y="392" width="36" height="36"/><rect x="244" y="392" width="36" height="36"/><rect x="340" y="392" width="36" height="36"/><rect x="436" y="392" width="36" height="36"/>
    <rect x="196" y="440" width="36" height="36"/><rect x="340" y="440" width="36" height="36"/><rect x="484" y="440" width="36" height="36"/>
    <rect x="244" y="488" width="36" height="36"/><rect x="340" y="488" width="36" height="36"/><rect x="388" y="488" width="36" height="36"/>
    <rect x="196" y="536" width="36" height="36"/><rect x="292" y="536" width="36" height="36"/><rect x="484" y="536" width="36" height="36"/>
  </g>
  <rect x="588" y="260" width="452" height="392" rx="28" fill="#12233c" stroke="#294a73"/>
  <text x="620" y="314" fill="#8ca2c5" font-family="Inter, Arial, sans-serif" font-size="13">ORDER</text>
  <text x="620" y="360" fill="#eef6ff" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700">MoneyFly Basic</text>
  <text x="620" y="402" fill="#c2d4ee" font-family="Inter, Arial, sans-serif" font-size="18">Amount: $9.90</text>
  <text x="620" y="442" fill="#c2d4ee" font-family="Inter, Arial, sans-serif" font-size="18">Method: Alipay</text>
  <text x="620" y="482" fill="#c2d4ee" font-family="Inter, Arial, sans-serif" font-size="18">Expires in: 14m 12s</text>
  <rect x="620" y="526" width="300" height="58" rx="18" fill="url(#accent)"/>
  <text x="700" y="563" fill="#04111a" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">Paid successfully</text>
  <text x="160" y="742" fill="#8ca2c5" font-family="Inter, Arial, sans-serif" font-size="14">When paid, the dialog closes, subscription refreshes, and the current profile is reloaded.</text>

  <rect x="160" y="792" width="880" height="216" rx="22" fill="#0f2035" stroke="#203956"/>
  <text x="192" y="836" fill="#8ca2c5" font-family="Inter, Arial, sans-serif" font-size="13">PAYMENT STATES</text>
  <text x="192" y="890" fill="#6ef5c2" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700">waiting -> polling -> paid -> refresh -> close</text>
  <text x="192" y="930" fill="#c2d4ee" font-family="Inter, Arial, sans-serif" font-size="16">No external web page, no manual copy step, no hidden browser context.</text>
</svg>
