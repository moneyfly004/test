<svg width="1600" height="1200" viewBox="0 0 1600 1200" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="MoneyFly auth flow">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#07111f"/>
      <stop offset="100%" stop-color="#091827"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1b2d"/>
      <stop offset="100%" stop-color="#10233b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#25d0ff"/>
      <stop offset="100%" stop-color="#33f0b2"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="20" flood-color="#000" flood-opacity="0.38"/>
    </filter>
  </defs>
  <rect width="1600" height="1200" fill="url(#bg)"/>
  <text x="80" y="92" fill="#eef6ff" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="700">MoneyFly auth flow</text>
  <text x="80" y="124" fill="#8ca2c5" font-family="Inter, Arial, sans-serif" font-size="16">Desktop login, registration, and password reset with email verification</text>

  <g filter="url(#shadow)">
    <rect x="80" y="170" width="430" height="930" rx="26" fill="url(#panel)" stroke="#21405f"/>
    <rect x="585" y="170" width="430" height="930" rx="26" fill="url(#panel)" stroke="#21405f"/>
    <rect x="1090" y="170" width="430" height="930" rx="26" fill="url(#panel)" stroke="#21405f"/>
  </g>

  <g fill="#eef6ff" font-family="Inter, Arial, sans-serif">
    <text x="116" y="214" font-size="22" font-weight="700">Login</text>
    <text x="621" y="214" font-size="22" font-weight="700">Register</text>
    <text x="1126" y="214" font-size="22" font-weight="700">Reset password</text>
  </g>

  <g>
    <rect x="116" y="250" width="358" height="68" rx="16" fill="#12233c" stroke="#28486f"/>
    <text x="136" y="276" fill="#8ca2c5" font-family="Inter, Arial, sans-serif" font-size="13">Username or email</text>
    <text x="136" y="300" fill="#eaf3ff" font-family="Inter, Arial, sans-serif" font-size="18">user@moneyfly.top</text>
    <rect x="116" y="334" width="358" height="68" rx="16" fill="#12233c" stroke="#28486f"/>
    <text x="136" y="360" fill="#8ca2c5" font-family="Inter, Arial, sans-serif" font-size="13">Password</text>
    <text x="136" y="384" fill="#eaf3ff" font-family="Inter, Arial, sans-serif" font-size="18">••••••••••</text>
    <rect x="116" y="418" width="358" height="60" rx="16" fill="url(#accent)"/>
    <text x="247" y="455" fill="#05111d" font-family="Inter, Arial, sans-serif" font-size="19" font-weight="700">Sign in</text>
    <rect x="116" y="500" width="170" height="42" rx="21" fill="#0f2038" stroke="#294a73"/>
    <text x="138" y="527" fill="#b3c8e6" font-family="Inter, Arial, sans-serif" font-size="14">Remember me</text>
    <circle cx="263" cy="521" r="10" fill="#25d0ff"/>
    <text x="300" y="527" fill="#8ca2c5" font-family="Inter, Arial, sans-serif" font-size="14">Refresh token in secure storage</text>
  </g>

  <g>
    <rect x="621" y="250" width="358" height="52" rx="14" fill="#12233c" stroke="#28486f"/>
    <text x="640" y="282" fill="#eaf3ff" font-family="Inter, Arial, sans-serif" font-size="16">Username</text>
    <rect x="621" y="316" width="358" height="52" rx="14" fill="#12233c" stroke="#28486f"/>
    <text x="640" y="348" fill="#eaf3ff" font-family="Inter, Arial, sans-serif" font-size="16">Email</text>
    <rect x="621" y="382" width="358" height="52" rx="14" fill="#12233c" stroke="#28486f"/>
    <text x="640" y="414" fill="#eaf3ff" font-family="Inter, Arial, sans-serif" font-size="16">Password</text>
    <rect x="621" y="448" width="358" height="52" rx="14" fill="#12233c" stroke="#28486f"/>
    <text x="640" y="480" fill="#eaf3ff" font-family="Inter, Arial, sans-serif" font-size="16">Confirm password</text>
    <rect x="621" y="514" width="232" height="52" rx="14" fill="#12233c" stroke="#28486f"/>
    <text x="640" y="546" fill="#eaf3ff" font-family="Inter, Arial, sans-serif" font-size="16">Email code</text>
    <rect x="869" y="514" width="110" height="52" rx="14" fill="#102f31" stroke="#1f6d5a"/>
    <text x="888" y="546" fill="#73f7c3" font-family="Inter, Arial, sans-serif" font-size="15">Send code</text>
    <rect x="621" y="580" width="358" height="52" rx="14" fill="#12233c" stroke="#28486f"/>
    <text x="640" y="612" fill="#eaf3ff" font-family="Inter, Arial, sans-serif" font-size="16">Invite code (optional)</text>
    <rect x="621" y="652" width="358" height="60" rx="16" fill="url(#accent)"/>
    <text x="763" y="689" fill="#05111d" font-family="Inter, Arial, sans-serif" font-size="19" font-weight="700">Create account</text>
    <text x="621" y="754" fill="#8ca2c5" font-family="Inter, Arial, sans-serif" font-size="14">Auto login after success, keep original language set</text>
  </g>

  <g>
    <rect x="1126" y="250" width="358" height="52" rx="14" fill="#12233c" stroke="#28486f"/>
    <text x="1145" y="282" fill="#eaf3ff" font-family="Inter, Arial, sans-serif" font-size="16">Email</text>
    <rect x="1126" y="316" width="358" height="52" rx="14" fill="#12233c" stroke="#28486f"/>
    <text x="1145" y="348" fill="#eaf3ff" font-family="Inter, Arial, sans-serif" font-size="16">Verification code</text>
    <rect x="1126" y="382" width="358" height="52" rx="14" fill="#12233c" stroke="#28486f"/>
    <text x="1145" y="414" fill="#eaf3ff" font-family="Inter, Arial, sans-serif" font-size="16">New password</text>
    <rect x="1126" y="448" width="358" height="52" rx="14" fill="#12233c" stroke="#28486f"/>
    <text x="1145" y="480" fill="#eaf3ff" font-family="Inter, Arial, sans-serif" font-size="16">Confirm new password</text>
    <rect x="1126" y="514" width="358" height="60" rx="16" fill="#ffb347"/>
    <text x="1234" y="551" fill="#1f1404" font-family="Inter, Arial, sans-serif" font-size="19" font-weight="700">Reset password</text>
    <text x="1126" y="618" fill="#8ca2c5" font-family="Inter, Arial, sans-serif" font-size="14">Return to login after success, auto login allowed</text>
  </g>

  <g stroke="#294a73" stroke-width="2">
    <path d="M515 420 H569" />
    <path d="M1017 420 H1071" />
  </g>
  <g fill="#8ca2c5" font-family="Inter, Arial, sans-serif" font-size="13">
    <text x="524" y="412">success</text>
    <text x="1025" y="412">verify via email</text>
  </g>
</svg>
